use_case:
  name: retail
  primary_key: id
  generation:
    records_per_primary_key:
      distribution:
        type: lognormal
        parameters:
          mu: 3.5
          sigma: 0.75
    injection_gaps:
      distribution:
        type: random
        parameters:
          prob: 0.1
  anomalies:
    - name: missing_values
      distribution:
        type: random
        parameters:
          prob: 0.1
      columns: any
    - name: duplicate_values
      distribution:
        type: random
        parameters:
          prob: 0.1
      columns: any
    - name: invalid_category
      distribution:
        type: random
        parameters:
          prob: 0.1
      columns: ['product_id', 'product_name', 'payment_method']
    - name: invalid_date
      distribution:
        type: weighted_choice
        parameters:
          values: ["%m/%d/%Y", "%Y-%m-%dT%H:%M:%SZ"]
          weights: [0.6, 0.4]
      columns: any
  schema:
    fields:
      - name: id
        unique_per_id: True
        dtype: int32
        distribution:
          type: sequential
          parameters:
            start: 1
            step: 1
        nullable: False
      - name: date
        unique_per_id: True
        dtype: "%Y-%m-%d"
        distribution:
          type: sequential
          parameters:
           start: "2023-01-01"
           step: 1
        nullable: False
      - name: store_id
        unique_per_id: True
        dtype: int32
        distribution:
          type: weighted_choice
          parameters:
            values: [1, 2, 3, 4, 5]
            weights: [0.5, 0.2, 0.1, 0.1, 0.1]
        nullable: False
      - name: customer_id
        unique_per_id: True
        dtype: int32
        distribution:
          type: uniform
          parameters:
            min: 1000
            max: 1999
        nullable: False
      - name: product
        unique_per_id: False
        dtype: str
        distribution:
          type: weighted_choice_mapping
          parameters:
            columns: {product_id: [1001, 1002, 1003, 1004, 1005], product_name: ["A", "B", "C", "D", "E"]}
            weights: [0.4, 0.2, 0.2, 0.1, 0.1]
        nullable: False
      - name: quantity
        unique_per_id: False
        dtype: int32
        distribution:
          type: uniform
          parameters:
            min: 1
            max: 10
        nullable: False
      - name: unit_price
        unique_per_id: False
        dtype: float32
        distribution:
          type: lognormal
          parameters:
            mu: 3.5
            sigma: 0.75
        nullable: False
      - name: payment_method
        unique_per_id: True
        dtype: str
        distribution:
          type: weighted_choice
          parameters:
            values: ["credit_card", "cash", "store_credit"]
            weights: [0.8, 0.15, 0.05]
        nullable: False