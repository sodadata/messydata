use_case:
  name: retail
  generation:
    records_per_primary_key:
      distribution:
        type: lognormal
        parameters:
          mu: 3.5
          sigma: 0.75
    injection_gaps:
      distribution:
        type: random
        parameters:
          threshold: 0.9
  anomalies:
    - name: missing_values
      distribution:
        type: random
        parameters:
          threshold: 0.9
    - name: duplicate_values
      distribution:
        type: random
        parameters:
          threshold: 0.9
    - name: invalid_values
      distribution:
        type: random
        parameters:
          threshold: 0.9
    - name: invalid_date
      distribution:
        type: weighted_choice
        parameters:
          values: ["%m/%d/%Y", "%Y-%m-%dT%H:%M:%SZ"]
          weights: [0.6, 0.4]
  schema:
    fields:
      - name: transaction_id
        type: integer
        distribution:
          type: sequential
          parameters:
            start: 1
            step: 1
        nullable: false
      - name: date
        type: "%Y-%m-%d"
        distribution:
          type: sequential
          parameters:
           start: "2023-01-01"
           step: 1
        nullable: false
      - name: store_id
        type: integer
        distribution:
          type: weighted_choice
          parameters:
            values: [1, 2, 3, 4, 5]
            weights: [0.5, 0.3, 0.2]
        nullable: false
      - name: customer_id
        type: string
        distribution:
          type: uniform
          parameters:
            min: 1000
            max: 1999
        nullable: false
      - name: product
        type: mapping
        distribution:
          type: weighted_choice
          parameters:
            mapping:
              - {product_id: 1001, product_name: "Product A", probability: 0.4}
              - {product_id: 1002, product_name: "Product B", probability: 0.2}
              - {product_id: 1003, product_name: "Product C", probability: 0.2}
              - {product_id: 1004, product_name: "Product D", probability: 0.1}
              - {product_id: 1005, product_name: "Product E", probability: 0.1}
        nullable: false
      - name: quantity
        type: integer
        distribution:
          type: uniform
          parameters:
            min: 1
            max: 100
        nullable: false
      - name: unit_price
        type: float
        distribution:
          type: lognormal
          parameters:
            mu: 3.5
            sigma: 0.75
        nullable: false
      - name: payment_method
        type: string
        distribution:
          type: weighted_choice
          parameters:
            values: ["credit_card", "cash", "store_credit"]
            weights: [0.8, 0.15, 0.05]
        nullable: false