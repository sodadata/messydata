[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quasidata"
version = "0.1.0"
description = "Synthetic dirty data generator"
requires-python = ">=3.9"
dependencies = [
    "pyyaml",
    "numpy",
    "pandas",
    "faker",
    "pydantic>=2.12.5",
]

[project.optional-dependencies]
dev = ["pytest"]
